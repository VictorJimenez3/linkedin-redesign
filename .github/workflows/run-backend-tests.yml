name: run-backend-tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run database unit tests with coverage
        run: |
          cd backend
          pytest ../tests/tests/test-files/test_database.py --cov=database --cov-report=term-missing --cov-fail-under=80 -v

      - name: Run app unit tests with coverage
        run: |
          cd backend
          pytest ../tests/tests/test-files/test_app.py --cov=app --cov-report=term-missing --cov-fail-under=80 -v

      - name: Run mutation analysis
        run: |
          cd backend
          python run_mutation_tests.py
